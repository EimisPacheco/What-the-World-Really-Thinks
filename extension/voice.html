<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Voice Agent - What the World Really Thinks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 8px;
      max-width: 420px;
      margin: 0 auto;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: auto;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    h2 {
      color: #333;
      margin-bottom: 12px;
      font-size: 20px;
      margin-top: 0;
    }
    h2::before {
      content: "🎙️ ";
    }
    /* SAME status bar styles as index.html */
    .status-bar {
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .status-bar.info {
      background: #bee3f8;
      color: #2c5282;
    }
    .status-bar.success {
      background: #c6f6d5;
      color: #22543d;
    }
    .status-bar.error {
      background: #fed7d7;
      color: #742a2a;
    }
    .refresh-hint {
      background: #e2e8f0;
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 13px;
      color: #4a5568;
      display: none;
    }
    .refresh-hint.show {
      display: block;
    }
    .refresh-hint strong {
      color: #2d3748;
    }
    .info {
      background: #e3f2fd;
      padding: 10px;
      border-radius: 5px;
      border-left: 3px solid #2196F3;
      margin-bottom: 12px;
    }
    .info strong {
      display: block;
      margin-bottom: 4px;
      color: #1976D2;
      font-size: 13px;
    }
    .info ul {
      margin: 2px 0 0 0;
      padding-left: 16px;
    }
    .info li {
      margin-bottom: 3px;
      line-height: 1.3;
      font-size: 12px;
    }
    /* ElevenLabs widget styling */
    elevenlabs-convai {
      margin: 12px 0 0 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Voice Agent</h2>

    <!-- SAME status bar as index.html -->
    <div id="statusBar" class="status-bar info" style="display: none;"></div>

    <div class="info">
      <strong>How to use:</strong>
      <ul>
        <li>This page runs outside Tableau so microphone permissions work</li>
        <li>Use voice commands like: "Analyze: Social media makes people fool"</li>
        <li>Or: "Vaccines are essential for public health"</li>
        <li>Analysis takes ~60 seconds - dashboard auto-refreshes when complete!</li>
      </ul>
    </div>

    <!-- ElevenLabs Agent widget with your agent ID -->
    <elevenlabs-convai agent-id="agent_3301kee9m1t3fftbyqbv2q9tfj57"></elevenlabs-convai>
  </div>

  <!-- ElevenLabs widget loader -->
  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

  <script>
    console.log('🎤 Voice agent page loaded');
    console.log('Parent window available:', !!window.opener);

    // ============================================
    // AUTOMATIC REFRESH DETECTION
    // ============================================

    let lastCheckTime = Date.now();
    let hasTriggeredRefresh = false;

    // Check for new analysis completion
    async function checkForNewAnalysis() {
      try {
        const response = await fetch('/api/last-analysis');
        const data = await response.json();

        if (data.timestamp) {
          const analysisTime = new Date(data.timestamp).getTime();
          const statusBar = document.getElementById('statusBar');

          // Check if this is a new analysis (happened after we loaded the page)
          if (analysisTime > lastCheckTime) {

            // Show "Analyzing..." status when analysis is in progress
            if (data.status === 'analyzing' && statusBar) {
              console.log('🤖 Analysis in progress...');
              console.log('   Question:', data.question);

              // Show status in voice agent popup
              statusBar.className = 'status-bar info';
              statusBar.textContent = '🤖 Analyzing question with AI... This may take 30-60 seconds.';
              statusBar.style.display = 'block';

              // ALSO send message to main page to show status there
              if (window.opener && !window.opener.closed) {
                window.opener.postMessage({
                  type: 'VOICE_ANALYSIS_STATUS',
                  status: 'analyzing',
                  question: data.question,
                  source: 'voice-agent'
                }, '*');
                console.log('📤 Sent "analyzing" status to main page');
              }

              // Reset refresh flag for new analysis
              hasTriggeredRefresh = false;
            }

            // Show success and trigger refresh when analysis is complete
            else if (data.status === 'complete' && !hasTriggeredRefresh) {
              console.log('========================================');
              console.log('✅ ANALYSIS COMPLETE!');
              console.log('   Question:', data.question);
              console.log('   Countries:', data.countryCount);
              console.log('   Timestamp:', data.timestamp);
              console.log('========================================');

              hasTriggeredRefresh = true;
              await triggerDashboardRefresh(data.countryCount);
            }
          }
        }
      } catch (error) {
        console.error('Error checking for new analysis:', error);
      }
    }

    // Trigger automatic dashboard refresh
    async function triggerDashboardRefresh(countryCount) {
      console.log('🔄 AUTO-TRIGGERING DASHBOARD REFRESH...');

      if (window.opener && !window.opener.closed) {
        try {
          // Send message to parent window to trigger refresh
          window.opener.postMessage({
            type: 'TRIGGER_TABLEAU_REFRESH',
            countryCount: countryCount || 52,
            source: 'voice-agent-auto'
          }, '*');

          console.log('✅ Refresh message sent to main dashboard!');

          // Show success status (matching analyze button format exactly)
          const statusBar = document.getElementById('statusBar');
          if (statusBar) {
            statusBar.className = 'status-bar success';
            statusBar.textContent = `✅ Analysis complete! ${countryCount} countries analyzed. Dashboard will auto-refresh in ~5 seconds...`;
            statusBar.style.display = 'block';
          }

        } catch (error) {
          console.error('❌ Error triggering refresh:', error);
        }
      } else {
        console.error('❌ No parent window available');
      }
    }

    // Start automatic monitoring when page loads
    window.addEventListener('load', () => {
      console.log('✅ Voice agent ready');
      console.log('🔍 Monitoring for analysis status...');

      // Check every 2 seconds for faster status updates
      setInterval(checkForNewAnalysis, 2000);

      // Also check immediately
      checkForNewAnalysis();
    });
  </script>
</body>
</html>
